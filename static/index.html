<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SixJax Poker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="base.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cards.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9824;</text></svg>">
</head>
<body>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<!-- ============================================================ -->
<!-- LOGIN SCREEN -->
<!-- ============================================================ -->
<div id="screen-login" class="screen active">
    <div class="login-container">
        <div class="login-brand">
            <div class="suits">
                <span>&#9824;</span>
                <span class="red">&#9829;</span>
                <span>&#9827;</span>
                <span class="red">&#9830;</span>
            </div>
            <div class="main-title">SixJax</div>
            <div class="subtitle">Jax Players Club</div>
        </div>

        <div class="login-box surface">
            <div class="login-tabs">
                <button class="login-tab active" data-tab="login">Sign In</button>
                <button class="login-tab" data-tab="register">Register</button>
            </div>

            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="Enter username" autocomplete="username" maxlength="20">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password">
                </div>
                <div id="login-error" class="login-error"></div>
                <button type="submit" id="login-submit-btn" class="btn btn-primary btn-lg">Sign In</button>
            </form>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- LOBBY SCREEN -->
<!-- ============================================================ -->
<div id="screen-lobby" class="screen">
    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <span class="brand-title">SixJax</span>
            </div>
            <div class="user-info">
                <span id="header-username"></span>
                <span id="header-points" class="user-points"></span>
                <button id="logout-btn" class="btn btn-sm btn-secondary">Logout</button>
            </div>
        </header>

        <div class="lobby-actions">
            <button id="create-room-btn" class="btn btn-primary">Create Room</button>
            <div style="display:flex;gap:var(--sp-2);align-items:center">
                <input type="text" id="join-code-input" placeholder="Room Code" 
                       style="width:120px;text-transform:uppercase" maxlength="5">
                <button id="join-code-btn" class="btn btn-secondary btn-sm">Join</button>
            </div>
        </div>

        <div>
            <h2 class="section-title">Open Rooms</h2>
            <div id="room-list" class="room-list">
                <div class="empty-state">
                    <div class="icon">&#9824;</div>
                    <p>Loading rooms...</p>
                </div>
            </div>
        </div>

        <div class="leaderboard-section">
            <h2 class="section-title">Leaderboard</h2>
            <div id="leaderboard" class="leaderboard">
                <div class="empty-state">
                    <div class="icon">&#9819;</div>
                    <p>No games played yet</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- ROOM SCREEN (Pre-game) -->
<!-- ============================================================ -->
<div id="screen-room" class="screen">
    <div class="app-container">
        <header class="app-header">
            <div class="brand">
                <span class="brand-title">SixJax</span>
            </div>
            <div class="user-info">
                <span id="room-point-display" class="user-points"></span>
            </div>
        </header>

        <div class="room-header">
            <div class="label" style="margin-bottom:var(--sp-2)">Room Code</div>
            <div class="room-code-display">
                <span id="room-code-text">-----</span>
                <span class="copy-hint">Click to copy</span>
            </div>
        </div>

        <div id="player-slots" class="player-slots"></div>

        <div class="room-controls">
            <button id="ready-btn" class="btn btn-primary">Ready Up</button>
            <button id="leave-room-btn" class="btn btn-danger">Leave Room</button>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- GAME SCREEN -->
<!-- ============================================================ -->
<div id="screen-game" class="screen">
    <div class="game-screen">
        <!-- Top bar -->
        <div class="game-top-bar">
            <span id="hand-info" class="hand-info">Hand #1</span>
            <span id="point-value-display" class="point-value">1x pts</span>
            <button id="leave-game-btn" class="btn btn-sm btn-secondary">Leave</button>
        </div>

        <!-- Opponents -->
        <div id="opponents-area" class="opponents-area"></div>

        <!-- Center: Draw pile, last card, actions -->
        <div class="center-area">
            <div class="table-center">
                <div id="draw-pile" class="draw-pile"></div>
                <div id="last-drawn-card" class="last-drawn-card"></div>
            </div>
            <div id="last-action-text" class="last-action-text"></div>
            <div id="action-area" class="action-area">
                <div id="turn-indicator" class="turn-indicator">Loading...</div>
                <div id="action-buttons" class="action-buttons"></div>
            </div>
        </div>

        <!-- Player hand -->
        <div class="player-hand-area">
            <div id="player-label" class="player-label">You</div>
            <div id="player-cards" class="player-cards"></div>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- SCORING OVERLAY -->
<!-- ============================================================ -->
<div id="scoring-overlay" class="scoring-overlay">
    <div id="scoring-content" class="scoring-content"></div>
</div>

<!-- ============================================================ -->
<!-- BURNED CARD POPUP -->
<!-- ============================================================ -->
<div id="burned-card-popup" class="burned-card-popup">
    <div class="popup-text">Your burned card was:</div>
    <div class="burned-card-display"></div>
</div>

<!-- ============================================================ -->
<!-- CREATE ROOM MODAL -->
<!-- ============================================================ -->
<div id="create-room-modal" class="modal-overlay">
    <div class="modal">
        <h2>Create Room</h2>
        <form id="create-room-form">
            <div class="input-group">
                <label for="room-point-value">Point Value</label>
                <select id="room-point-value">
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="5">5x</option>
                    <option value="10">10x</option>
                </select>
            </div>
            <div class="input-group">
                <label for="room-max-players">Max Players</label>
                <select id="room-max-players">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4" selected>4 Players</option>
                    <option value="5">5 Players</option>
                    <option value="6">6 Players</option>
                </select>
            </div>
            <div class="modal-actions">
                <button type="button" id="cancel-create-room" class="btn btn-secondary">Cancel</button>
                <button type="submit" class="btn btn-primary">Create</button>
            </div>
        </form>
    </div>
</div>

<script src="app.js?v=5"></script>
<script src="game-engine.js"></script>
</body>
</html>
